<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:#eef1f2;color:#1a2025;font-size:15px;line-height:1.4;
  -webkit-text-size-adjust:100%;overscroll-behavior-y:none}
input,select,textarea,button{font-family:inherit;font-size:16px}
button{cursor:pointer;border:none;background:none;color:inherit}
.hidden{display:none!important}

/* ---- Header ---- */
header{position:sticky;top:0;z-index:50;background:#0d7a6f;color:#fff;
  padding:calc(env(safe-area-inset-top) + 9px) 12px 9px;
  display:flex;align-items:center;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.18)}
header .htitle{flex:1;font-weight:600;font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
header button.hbtn{color:#fff;padding:6px 8px;border-radius:8px;font-size:14px;font-weight:500;
  display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.14)}
header button.hbtn:active{background:rgba(255,255,255,.28)}
header svg{width:18px;height:18px;display:block}

main{padding:12px 12px calc(env(safe-area-inset-bottom) + 20px);max-width:760px;margin:0 auto}

/* ---- Generic ---- */
.panel{background:#fff;border-radius:14px;padding:14px;margin-bottom:12px;
  box-shadow:0 1px 3px rgba(20,30,40,.07)}
.panel h2{font-size:13px;text-transform:uppercase;letter-spacing:.04em;color:#6b7785;margin-bottom:9px;font-weight:700}
.muted{color:#6b7785}
.small{font-size:13px}
.tiny{font-size:12px}

/* ---- Lists ---- */
.row-item{display:flex;align-items:center;gap:11px;padding:12px 13px;background:#fff;
  border-radius:12px;margin-bottom:9px;box-shadow:0 1px 3px rgba(20,30,40,.06)}
.row-item:active{background:#f4f6f6}
.row-icon{flex:none;width:34px;height:34px;border-radius:9px;background:#0d7a6f;color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.row-body{flex:1;min-width:0}
.row-title{font-weight:600;font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.row-desc{font-size:12px;color:#6b7785;margin-top:1px}
.row-chev{flex:none;color:#b3bcc4}
.row-chev svg{width:20px;height:20px;display:block}

/* ---- Buttons ---- */
.btn{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;
  padding:13px;border-radius:11px;font-weight:600;font-size:15px}
.btn.primary{background:#0d7a6f;color:#fff}
.btn.primary:active{background:#0a5d54}
.btn.sec{background:#eef1f2;color:#1a2025;border:1.4px solid #d6dbde}
.btn.sec:active{background:#e2e6e9}
.btn + .btn{margin-top:9px}
.btn svg{width:19px;height:19px}

/* ---- Fields ---- */
label.fld{display:block;margin-bottom:10px}
label.fld > span{display:block;font-size:12.5px;font-weight:600;color:#55606b;margin-bottom:3px}
.fld input,.fld textarea,.fld select{width:100%;border:1.4px solid #d6dbde;border-radius:9px;
  padding:9px 10px;background:#fafbfb;color:#1a2025}
.fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:#0d7a6f;background:#fff}
.fld textarea{min-height:62px;resize:vertical}
.row2{display:flex;gap:9px}
.row2 > *{flex:1}

/* ---- Photos ---- */
.photos{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 3px}
.thumb{position:relative;width:74px;height:74px;border-radius:9px;overflow:hidden;background:#eef1f2;
  border:1px solid #dde1e3}
.thumb img{width:100%;height:100%;object-fit:cover;display:block}
.addphoto{width:74px;height:74px;border-radius:9px;border:1.8px dashed #b6c0c6;background:#fafbfb;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#0d7a6f}
.addphoto svg{width:22px;height:22px}
.addphoto span{font-size:10.5px;font-weight:700}

/* ---- Photo viewer ---- */
.viewer{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.94);display:flex;flex-direction:column}
.viewer .vtop{display:flex;justify-content:flex-end;padding:calc(env(safe-area-inset-top) + 10px) 14px 6px}
.viewer .vtop button{color:#fff;font-size:15px;font-weight:600;padding:8px 14px;background:rgba(255,255,255,.16);border-radius:9px}
.viewer .vimg{flex:1;display:flex;align-items:center;justify-content:center;padding:8px;overflow:auto}
.viewer .vimg img{max-width:100%;max-height:100%;border-radius:6px}
.viewer .vimg img.zoomed{max-width:none;max-height:none}
.viewer .vbot{padding:12px 14px calc(env(safe-area-inset-bottom) + 14px)}
.viewer .vbot button{width:100%;padding:13px;border-radius:11px;background:#c0392b;color:#fff;font-weight:700;font-size:15px}

/* ---- Toast ---- */
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(env(safe-area-inset-bottom) + 24px);
  background:#1a2025;color:#fff;padding:11px 18px;border-radius:11px;font-size:14px;font-weight:500;
  z-index:300;opacity:0;transition:opacity .25s;pointer-events:none;max-width:88%;text-align:center;
  box-shadow:0 4px 16px rgba(0,0,0,.3)}
.toast.show{opacity:1}

/* ---- Progress ---- */
.bar{height:8px;border-radius:6px;background:#e2e6e9;overflow:hidden;margin-top:6px}
.bar > i{display:block;height:100%;background:#0d7a6f;border-radius:6px;transition:width .25s}

.badge{display:inline-block;padding:3px 9px;border-radius:7px;font-size:11.5px;font-weight:700;
  letter-spacing:.02em;margin:4px 0}
.badge.auto{background:#fdecd2;color:#9a6516}
.badge.added{background:#e7eef6;color:#2f5d92}

.consigne{background:#fff7e8;border:1px solid #f0dcb0;border-radius:9px;padding:8px 10px;
  margin:9px 0;font-size:12.8px;color:#7a5a14}

/* ---- Bouton d'action sur une ligne ---- */
.rowact{flex:none;width:32px;height:32px;border-radius:9px;background:#f0f3f4;color:#55606b;
  display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;line-height:1}
.rowact:active{background:#e2e6e9}

/* ---- Feuille d'action (modale bas d'écran) ---- */
.ovl{position:fixed;inset:0;z-index:420;background:rgba(10,20,25,.45);
  display:flex;align-items:flex-end;justify-content:center;opacity:0;transition:opacity .17s}
.ovl.show{opacity:1}
.ovl .sheet{background:#fff;width:100%;max-width:520px;border-radius:18px 18px 0 0;
  padding:16px 16px calc(env(safe-area-inset-bottom) + 16px);box-shadow:0 -4px 24px rgba(0,0,0,.2);
  transform:translateY(14px);transition:transform .17s}
.ovl.show .sheet{transform:none}
.ovl .sheet h3{font-size:16.5px;font-weight:700;margin-bottom:9px}
.ovl .sheet .sub{font-size:13px;color:#6b7785;margin:-4px 0 12px;line-height:1.4}
.ovl .sheet input{width:100%;border:1.4px solid #d6dbde;border-radius:10px;padding:12px;
  background:#fafbfb;color:#1a2025;margin-bottom:12px}
.ovl .sheet input:focus{outline:none;border-color:#0d7a6f;background:#fff}
.ovl .sheet .opt{display:flex;align-items:center;gap:9px;padding:14px 13px;border-radius:11px;
  background:#f4f6f6;margin-bottom:8px;font-weight:600;font-size:14.5px}
.ovl .sheet .opt:active{background:#e7ebec}
.ovl .sheet .opt.danger{color:#c0392b}
.ovl .sheet .sbtns{display:flex;gap:9px;margin-top:4px}
.ovl .sheet .sbtns button{flex:1;padding:13px;border-radius:11px;font-weight:700;font-size:15px}
.ovl .sheet .sbtn-ok{background:#0d7a6f;color:#fff}
.ovl .sheet .sbtn-cancel{background:#eef1f2;color:#1a2025;border:1.4px solid #d6dbde}
.ovl .sheet .sbtn-danger{background:#c0392b;color:#fff}
</style>

<body>
<header id="hdr"></header>

<div class="viewer hidden" id="viewer">

<script>
"use strict";

// DEBUG: Afficher les erreurs directement sur la page
window.addEventListener('error', (e) => {
  const msg = document.createElement('div');
  msg.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:10px;font-size:12px;z-index:9999;overflow:auto;max-height:200px';
  msg.textContent = '❌ ERREUR: ' + e.message + ' (' + e.filename + ':' + e.lineno + ')';
  document.body.appendChild(msg);
  console.error('ERROR:', e);
});

// DEBUG: Check si data.js est chargé
setTimeout(() => {
  if(typeof zones === 'undefined') {
    const msg = document.createElement('div');
    msg.style.cssText = 'position:fixed;top:0;left:0;right:0;background:orange;color:white;padding:10px;font-size:12px;z-index:9999';
    msg.textContent = '⚠️ data.js non chargé: zones is undefined';
    document.body.appendChild(msg);
    console.error('zones is undefined - data.js failed to load');
  }
}, 100);

/* ====================== ICÔNES ====================== */
const IC = {
  back:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>',
  chev:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>',
  cam:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>',
  exp:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>'
};

/* ====================== ÉTAT ====================== */
let DB = null, idbOK = false;
let state = { meta: {auditeur:''}, tds: {}, equip: {}, rooms: {} };
let photos = {};
let view = {name: 'home', tdId: null, roomId: null};
let saveTimer = null;
let viewerCurrent = null;

/* ====================== INDEXEDDB ====================== */
function idbOpen(){return new Promise((res)=>{
  let r;
  try{ r = indexedDB.open('wadra_v3', 1); }catch(e){ return res(false); }
  r.onupgradeneeded = e => {
    const db = e.target.result;
    if(!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
    if(!db.objectStoreNames.contains('photos')) db.createObjectStore('photos', {keyPath:'id'});
  };
  r.onsuccess = e => {DB = e.target.result; res(true);};
  r.onerror = () => res(false);
});}

async function idbPut(store, val, key){
  return new Promise((res, rej) => {
    const t = DB.transaction(store, 'readwrite');
    store === 'kv' ? t.objectStore(store).put(val, key) : t.objectStore(store).put(val);
    t.oncomplete = () => res();
    t.onerror = () => rej(t.error);
  });
}

async function idbGet(store, key){
  return new Promise((res, rej) => {
    const t = DB.transaction(store, 'readonly');
    const rq = t.objectStore(store).get(key);
    rq.onsuccess = () => res(rq.result);
    rq.onerror = () => rej(rq.error);
  });
}

async function idbDel(store, key){
  return new Promise((res, rej) => {
    const t = DB.transaction(store, 'readwrite');
    t.objectStore(store).delete(key);
    t.oncomplete = () => res();
    t.onerror = () => rej(t.error);
  });
}

async function idbAll(store){
  return new Promise((res, rej) => {
    const t = DB.transaction(store, 'readonly');
    const rq = t.objectStore(store).getAll();
    rq.onsuccess = () => res(rq.result || []);
    rq.onerror = () => rej(rq.error);
  });
}

/* ====================== SAUVEGARDE ====================== */
function scheduleSave(){
  state.meta.updated = new Date().toISOString();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(persistState, 500);
}

async function persistState(){
  try {
    if(idbOK) await idbPut('kv', JSON.parse(JSON.stringify(state)), 'state');
    else localStorage.setItem('wadra_state_v3', JSON.stringify(state));
  } catch(e) {
    try { localStorage.setItem('wadra_state_v3', JSON.stringify(state)); } catch(_) {}
  }
}

function touch(id){
  state.ts = state.ts || {};
  state.dirty = state.dirty || {};
  // Horodate la saisie locale : protège l'édition contre un écrasement par
  // une version distante plus ancienne lors de la synchro ("dernière écriture gagne").
  state.ts[id] = new Date().toISOString();
  state.dirty[id] = 1;
  scheduleSave();
  if(window.Sync && window.Sync.kick){ try { window.Sync.kick(); } catch(e){} }
}

/* ====================== HELPERS ====================== */
function $(id){ return document.getElementById(id); }
function esc(s){ return (s == null ? '' : String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2600);
}

let TREE = [];
function findZone(zoneId){ return TREE.find(z => z.id === zoneId); }
function findRoom(zoneId, roomId){
  const z = findZone(zoneId);
  if(!z) return null;
  return z.rooms.find(r => r.id === roomId);
}

function photosFor(key){ return Object.values(photos).filter(p => p.key === key); }

/* ====================== PHOTOS ====================== */
let photoTargetKey = null, photoTargetPlate = false;

async function shrink(file){
  const MAX = 1600, Q = 0.72;
  let bmp = null;
  try { bmp = await createImageBitmap(file, {imageOrientation:'from-image'}); }
  catch(e) { try { bmp = await createImageBitmap(file); } catch(_) { bmp = null; } }

  if(bmp){
    let w = bmp.width, h = bmp.height;
    if(Math.max(w,h) > MAX){
      const s = MAX / Math.max(w,h);
      w = Math.round(w * s);
      h = Math.round(h * s);
    }
    const c = document.createElement('canvas');
    c.width = w;
    c.height = h;
    c.getContext('2d').drawImage(bmp, 0, 0, w, h);
    return await new Promise(r => c.toBlob(b => r(b || file), 'image/jpeg', Q));
  }
  return file;
}

function triggerPhoto(key, plate){
  photoTargetKey = key;
  photoTargetPlate = !!plate;
  $('camInput').click();
}

$('camInput').addEventListener('change', async function(){
  const files = [...this.files];
  this.value = '';
  if(!files.length || !photoTargetKey) return;
  toast('Traitement ' + files.length + ' photo(s)…');

  for(const f of files){
    try {
      const blob = await shrink(f);
      const id = 'p' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
      const rec = {id, key: photoTargetKey, blob, plate: photoTargetPlate, synced: false};
      if(idbOK) await idbPut('photos', rec);
      rec.url = URL.createObjectURL(blob);
      photos[id] = rec;
    } catch(e) { toast('Erreur photo'); }
  }

  renderStripKind(photoTargetKey, true);
  renderStripKind(photoTargetKey, false);
  toast('Photo(s) enregistrée(s)');
  touch('photo');
});

async function deletePhoto(id){
  const p = photos[id];
  if(!p) return;
  if(p.url) URL.revokeObjectURL(p.url);
  delete photos[id];
  if(idbOK) try { await idbDel('photos', id); } catch(e) {}
  renderStripKind(p.key, true);
  renderStripKind(p.key, false);
  scheduleSave();
}

/* ====================== PHOTO VIEWER ====================== */
let staticPages = null, staticIdx = 0;

function openViewer(id){
  const p = photos[id];
  if(!p) return;
  staticPages = null;
  viewerCurrent = id;
  $('vImg').src = p.url;
  $('vImg').classList.remove('zoomed');
  $('vMove').style.display = '';
  $('vDel').style.display = '';
  $('vNav').style.display = 'none';
  $('viewer').classList.remove('hidden');
}

/* Visionneuse de documents statiques (plan de masse, schémas unifilaires) */
function openStatic(pages, idx, title){
  if(!pages || !pages.length) return;
  staticPages = pages;
  staticIdx = idx || 0;
  viewerCurrent = null;
  $('vMove').style.display = 'none';
  $('vDel').style.display = 'none';
  $('vNav').style.display = pages.length > 1 ? 'flex' : 'none';
  showStaticPage();
  $('viewer').classList.remove('hidden');
}
function showStaticPage(){
  $('vImg').classList.remove('zoomed');
  $('vImg').src = './' + staticPages[staticIdx];
  $('vPageInfo').textContent = 'Page ' + (staticIdx + 1) + ' / ' + staticPages.length + ' — toucher l\'image pour zoomer';
}
$('vPrev').onclick = () => { if(!staticPages) return; staticIdx = (staticIdx - 1 + staticPages.length) % staticPages.length; showStaticPage(); };
$('vNext').onclick = () => { if(!staticPages) return; staticIdx = (staticIdx + 1) % staticPages.length; showStaticPage(); };
$('vImg').onclick = () => { $('vImg').classList.toggle('zoomed'); };

$('vClose').onclick = () => {
  $('viewer').classList.add('hidden');
  $('vImg').src = '';
  $('vImg').classList.remove('zoomed');
  viewerCurrent = null;
  staticPages = null;
};

$('vMove').onclick = async () => {
  if(!viewerCurrent) return;
  const p = photos[viewerCurrent];
  if(!p) return;
  p.plate = !p.plate;
  p.synced = false;
  if(idbOK){ try { await idbPut('photos', {id:p.id, key:p.key, zoneId:p.zoneId, blob:p.blob, plate:p.plate, synced:false}); } catch(e) {} }
  renderStripKind(p.key, true);
  renderStripKind(p.key, false);
  toast(p.plate ? 'Photo reclassée « Plaque »' : 'Photo reclassée « Équipement »');
  touch('photo');
  $('viewer').classList.add('hidden');
  $('vImg').src = '';
  viewerCurrent = null;
};

$('vDel').onclick = () => {
  if(!viewerCurrent) return;
  const id = viewerCurrent;
  sheetConfirm('Supprimer cette photo ?', '', 'Supprimer', true, async () => {
    await deletePhoto(id);
    $('viewer').classList.add('hidden');
    $('vImg').src = '';
    viewerCurrent = null;
  });
};

/* ====================== ARBRE EFFECTIF (catalogue + modifications) ====================== */
function ensureStruct(){
  state.struct = state.struct || {};
  const S = state.struct;
  S.rooms = S.rooms || {};          // override pièce : {name?, zone?, del?}
  S.equip = S.equip || {};          // override équip. : {room?, del?}
  S.addedRooms = S.addedRooms || []; // [{id, zone, name}]
  S.addedEquip = S.addedEquip || []; // [{id, room, name}]
  return S;
}
function buildTree(){
  const S = ensureStruct(), RO = S.rooms, EO = S.equip;
  const zlist = zones.map(z => ({id:z.id, name:z.name, fullName:z.fullName, kVA:z.kVA, rooms:[]}));
  const zById = {}; zlist.forEach(z => zById[z.id] = z);
  const roomBase = {};
  zones.forEach(z => z.rooms.forEach(r => { roomBase[r.id] = {name:r.name, zone:z.id, custom:false}; }));
  S.addedRooms.forEach(ar => { roomBase[ar.id] = {name:ar.name, zone:ar.zone, custom:true}; });
  const eff = {};
  Object.keys(roomBase).forEach(rid => {
    const ov = RO[rid] || {};
    if(ov.del) return;
    const b = roomBase[rid];
    let zone = ov.zone || b.zone;
    if(!zById[zone]) zone = b.zone;
    eff[rid] = {id:rid, name:(ov.name != null ? ov.name : b.name), zone:zone, equipment:[], custom:b.custom};
  });
  zones.forEach(z => z.rooms.forEach(r => r.equipment.forEach(e => {
    const ov = EO[e.id] || {};
    if(ov.del) return;
    let rid = ov.room || r.id;
    if(!eff[rid]) rid = eff[r.id] ? r.id : null;
    if(rid && eff[rid]) eff[rid].equipment.push(ov.name != null ? Object.assign({}, e, {name: ov.name}) : e);
  })));
  S.addedEquip.forEach(ae => {
    const ov = EO[ae.id] || {};
    if(ov.del) return;
    const rid = ov.room || ae.room;
    if(rid && eff[rid]) eff[rid].equipment.push({id:ae.id, name:(ov.name != null ? ov.name : ae.name), custom:true});
  });
  const ordered = [];
  zones.forEach(z => z.rooms.forEach(r => ordered.push(r.id)));
  S.addedRooms.forEach(ar => ordered.push(ar.id));
  ordered.forEach(rid => { const er = eff[rid]; if(er && zById[er.zone]) zById[er.zone].rooms.push(er); });
  return zlist;
}

/* ---- mutations de structure (persistées + synchronisées) ---- */
function structDirty(){
  state.ts = state.ts || {};
  state.dirty = state.dirty || {};
  state.ts['struct'] = new Date().toISOString();
  state.dirty['struct'] = 1;
  scheduleSave();
  if(window.Sync && window.Sync.kick){ try { window.Sync.kick(); } catch(e){} }
}
function rndId(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function addRoomStruct(zoneId, name){ ensureStruct().addedRooms.push({id:'r_'+rndId(), zone:zoneId, name:name}); structDirty(); }
function renameRoomStruct(roomId, name){ const S=ensureStruct(); S.rooms[roomId]=Object.assign({}, S.rooms[roomId], {name:name}); structDirty(); }
function moveRoomStruct(roomId, zoneId){ const S=ensureStruct(); S.rooms[roomId]=Object.assign({}, S.rooms[roomId], {zone:zoneId}); structDirty(); }
function deleteRoomStruct(roomId){

}
function addEquipStruct(roomId, name){ const S=ensureStruct(); const id='e_'+rndId(); S.addedEquip.push({id:id, room:roomId, name:name}); state.equip[id]=state.equip[id]||{}; structDirty(); return id; }

/* ---- Création depuis le catalogue (fiches techniques DOE) ---- */
function addEquipFromCatalog(roomId, item){
  const id = addEquipStruct(roomId, item.name);
  // Pré-remplissage des caractéristiques depuis la notice technique
  state.equip[id] = {
    marque: item.marque || '',
    modele: item.modele || '',
    puissance: item.puissance || '',
    observations: item.obs ? ('[Catalogue] ' + item.obs) : '',
    catRef: item.id
  };
  state.ts = state.ts || {};
  state.ts['equip:' + id] = new Date().toISOString();
  state.dirty = state.dirty || {};
  state.dirty['equip:' + id] = 1;
  scheduleSave();
  // Photo de référence (page clé de la notice) ajoutée comme photo « plaque »
  if(item.img && window.WADRA_CATALOG){
    fetch(WADRA_CATALOG.imgBase + item.img)
      .then(r => (r && r.ok) ? r.blob() : null)
      .then(async blob => {
        if(!blob) return;
        const pid = 'p' + Date.now() + '_' + Math.random().toString(36).slice(2,7);
        const rec = {id: pid, key: id, blob: blob, plate: true, synced: false};
        if(idbOK){ try { await idbPut('photos', rec); } catch(e){} }
        rec.url = URL.createObjectURL(blob);
        photos[pid] = rec;
        touch('photo');
        if(view.name === 'equip' && view.equipId === id) renderEquip();
        else if(view.name === 'room') renderRoom();
      })
      .catch(() => {});
  }
  return id;
}

function moveEquipStruct(equipId, roomId){ const S=ensureStruct(); S.equip[equipId]=Object.assign({}, S.equip[equipId], {room:roomId}); structDirty(); }
function deleteEquipStruct(equipId){ const S=ensureStruct(); S.equip[equipId]=Object.assign({}, S.equip[equipId], {del:true}); structDirty(); }
function renameEquipStruct(equipId, name){ const S=ensureStruct(); S.equip[equipId]=Object.assign({}, S.equip[equipId], {name:name}); structDirty(); }
async function duplicateEquip(equipId){
  const r = findRoom(view.tdId, view.roomId); if(!r) return null;
  const e = r.equipment.find(x => x.id === equipId); if(!e) return null;
  const S = ensureStruct();
  const newId = 'e_' + rndId();
  S.addedEquip.push({id:newId, room: view.roomId, name: e.name + ' (copie)'});
  // copier les données saisies (sauf le marqueur IA)
  const src = state.equip[equipId] || {};
  const copy = {};
  ['statut','local','marque','modele','puissance','observations','qte','regime','heuresJour','joursSem','consigne','consigneOn','catRef'].forEach(k => { if(src[k] != null && src[k] !== '') copy[k] = src[k]; });
  if(copy.marque == null && e.marque) copy.marque = e.marque;
  if(copy.modele == null && e.modele) copy.modele = e.modele;
  if(copy.puissance == null && e.puissance) copy.puissance = e.puissance;
  if(copy.qte == null && e.qte) copy.qte = e.qte;
  state.equip[newId] = copy;
  // copier les photos (plaque + équipement) sous le nouvel id, à re-synchroniser
  const srcPhotos = Object.values(photos).filter(p => p.key === equipId);
  for(const p of srcPhotos){
    const nid = 'p' + Date.now() + '_' + Math.random().toString(36).slice(2,9);
    const rec = {id: nid, key: newId, blob: p.blob, plate: !!p.plate, synced: false};
    if(idbOK){ try { await idbPut('photos', rec); } catch(ex){} }
    rec.url = URL.createObjectURL(p.blob);
    photos[nid] = rec;
  }
  structDirty();
  return newId;
}
function qteOf(e){
  const f = state.equip[e.id] || {};
  let q = (f.qte != null && f.qte !== '') ? f.qte : (e.qte != null ? e.qte : 1);
  q = parseInt(q, 10);
  return (isNaN(q) || q < 1) ? 1 : q;
}

/* ====================== EXPLOITATION / BILAN DE PUISSANCE ====================== */
/* Régimes préréglés : remplissent heures/jour + jours/semaine (extrapolés × 52 sem.) */
const REGIMES = [
  {key:'',      label:'— (non renseigné)',        hj:'', js:''},
  {key:'24x7',  label:'24 h/24 · 7 j/sem',         hj:24, js:7},
  {key:'jour',  label:'Journée ~12 h · 7 j/sem',   hj:12, js:7},
  {key:'serv',  label:'Service ~10 h · 7 j/sem',   hj:10, js:7},
  {key:'bur',   label:'Bureau 8 h · 5 j/sem',      hj:8,  js:5},
  {key:'lav',   label:'Laverie 8 h · 6 j/sem',     hj:8,  js:6},
  {key:'nuit',  label:'Nuit ~10 h · 7 j/sem',      hj:10, js:7},
  {key:'perso', label:'Personnalisé',              hj:'', js:''}
];
function catRefOf(e){
  const f = state.equip[e.id] || {};
  if(!f.catRef || !window.WADRA_CATALOG) return null;
  return (WADRA_CATALOG.items || []).find(x => x.id === f.catRef) || null;
}
/* Détecte les équipements ayant une T° de consigne (clim, froid, ECS, piscine…) */
function isThermal(e){
  const f = state.equip[e.id] || {};
  const cat = (catRefOf(e) || {}).cat || '';
  if(/Climatisation/i.test(cat)) return true;
  const hay = ((e.name||'') + ' ' + (f.marque||'') + ' ' + (f.modele||'') + ' ' + (f.observations||'')).toLowerCase();
  return /clim|froid|chambre froide|congel|frigo|réfrig|refrig|\becs\b|eau chaude|ballon|chauffe|\bcta\b|pompe à chaleur|\bpac\b|\bfour\b|étuve|piscine|lagon|frigorifique|groupe.?froid/.test(hay);
}
function pUnitOf(e){
  const f = state.equip[e.id] || {};
  const raw = (f.puissance != null && f.puissance !== '') ? f.puissance : (e.puissance || '');
  const p = parseFloat(String(raw).replace(',', '.'));
  return isNaN(p) ? 0 : p;
}
/* Bilan d'un équipement : P installée (kW) et énergie annuelle estimée (kWh/an) */
function equipEnergy(e){
  const f = state.equip[e.id] || {};
  const q = qteOf(e);
  const pu = pUnitOf(e);
  const pInst = pu * q;
  const hj = parseFloat(String(f.heuresJour||'').replace(',', '.'));
  const js = parseFloat(String(f.joursSem||'').replace(',', '.'));
  const hasDur = !isNaN(hj) && hj > 0 && !isNaN(js) && js > 0;
  const kwhYear = hasDur ? pInst * hj * js * 52 : null;
  return {q, pu, pInst, hj:isNaN(hj)?null:hj, js:isNaN(js)?null:js, kwhYear};
}
function fmtNum(n, d){
  if(n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('fr-FR', {minimumFractionDigits:d||0, maximumFractionDigits:d||0});
}
function bilanLineHTML(e){
  const ee = equipEnergy(e);
  let s = '⚡ P installée : ' + fmtNum(ee.pu, 2) + ' kW';
  s += (ee.q > 1) ? (' × ' + ee.q + ' = <b>' + fmtNum(ee.pInst, 2) + ' kW</b>') : ' (×1)';
  if(ee.kwhYear != null) s += ' · ≈ <b>' + fmtNum(ee.kwhYear, 0) + ' kWh/an</b>';
  else s += ' · <span class="muted">renseigner h/jour et j/sem pour le kWh/an</span>';
  return s;
}

function countsTD(z){
  let total = 0, done = 0;
  z.rooms.forEach(r => {
    r.equipment.forEach(e => {
      total++;
      if((state.equip[e.id] || {}).statut) done++;
    });
  });
  return {total, done};
}

function globalCounts(){
  let total = 0, done = 0, photoN = Object.keys(photos).length;
  TREE.forEach(z => {
    const c = countsTD(z);
    total += c.total;
    done += c.done;
  });
  return {total, done, photoN};
}

/* ====================== RENDU : BILAN DE PUISSANCE ====================== */
function bilanTotals(){
  let pInst = 0, kwh = 0, withDur = 0, total = 0, missP = 0;
  TREE.forEach(z => z.rooms.forEach(r => r.equipment.forEach(e => {
    total++;
    const ee = equipEnergy(e);
    pInst += ee.pInst;
    if(ee.pu === 0) missP++;
    if(ee.kwhYear != null){ kwh += ee.kwhYear; withDur++; }
  })));
  return {pInst, kwh, withDur, total, missP};
}
function bilanStat(label, val){
  return '<div style="flex:1;min-width:130px;background:#f3f7f6;border-radius:11px;padding:10px 12px">' +
    '<div class="tiny muted">' + esc(label) + '</div>' +
    '<div style="font-size:18px;font-weight:800;color:#0d7a6f">' + val + '</div></div>';
}
function renderBilan(){
  const T = bilanTotals();
  let html = '<div class="panel">' +
    '<h2>Bilan de puissance — Hôtel</h2>' +
    '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:6px">' +
    bilanStat('Puissance installée', fmtNum(T.pInst, 1) + ' kW') +
    bilanStat('Énergie estimée', fmtNum(T.kwh, 0) + ' kWh/an') +
    '</div>' +
    '<div class="tiny muted" style="margin-top:8px">' + T.withDur + '/' + T.total + ' équipements avec durée renseignée' +
    (T.missP ? ' · ' + T.missP + ' sans puissance' : '') + '</div>' +
    '<button class="btn primary" id="expCSV" style="margin-top:11px">⬇️ Exporter le bilan (CSV)</button>' +
    '</div>';
  TREE.forEach(z => {
    let zP = 0, zK = 0, zN = 0;
    z.rooms.forEach(r => r.equipment.forEach(e => { const ee = equipEnergy(e); zP += ee.pInst; if(ee.kwhYear != null) zK += ee.kwhYear; zN++; }));
    if(!zN) return;
    html += '<div class="panel"><h2 style="font-size:15px">' + esc(z.name) + '</h2>' +
      '<div class="tiny muted" style="margin-bottom:4px">' + fmtNum(zP, 1) + ' kW installés · ≈ ' + fmtNum(zK, 0) + ' kWh/an</div>';
    z.rooms.forEach(r => {
      let rP = 0, rK = 0, rN = 0, rHasDur = false;
      r.equipment.forEach(e => { const ee = equipEnergy(e); rP += ee.pInst; if(ee.kwhYear != null){ rK += ee.kwhYear; rHasDur = true; } rN++; });
      if(!rN) return;
      html += '<div style="padding:7px 0;border-top:1px solid #eef1f2">' +
        '<div style="display:flex;justify-content:space-between;font-size:13.5px"><b>' + esc(r.name) + '</b><span>' + fmtNum(rP, 2) + ' kW</span></div>' +
        '<div class="tiny muted">' + rN + ' équip.' + (rHasDur ? ' · ≈ ' + fmtNum(rK, 0) + ' kWh/an' : '') + '</div>' +
        '</div>';
    });
    html += '</div>';
  });
  html += '<div class="tiny muted" style="text-align:center;padding:4px 8px 16px">Énergie annuelle = P installée × heures/jour × jours/semaine × 52. Les valeurs sans durée renseignée ne sont pas comptées dans les kWh/an.</div>';
  $('app').innerHTML = html;
  $('expCSV').onclick = exportBilanCSV;
}
function csvCell(v){ v = (v == null ? '' : String(v)); if(/[";\r\n]/.test(v)) v = '"' + v.replace(/"/g, '""') + '"'; return v; }
function csvNum(n){ return (n == null || isNaN(n)) ? '' : String(n).replace('.', ','); }
function exportBilanCSV(){
  const rows = [['TD','Piece','Equipement','Marque','Modele','Statut','Qte','P unitaire (kW)','P installee (kW)','Consigne (C)','h/jour','j/semaine','kWh/an','Observations']];
  TREE.forEach(z => z.rooms.forEach(r => r.equipment.forEach(e => {
    const f = state.equip[e.id] || {};
    const ee = equipEnergy(e);
    rows.push([z.name, r.name, e.name, f.marque || '', f.modele || '', f.statut || '', ee.q,
      csvNum(ee.pu), csvNum(ee.pInst), f.consigne || '', f.heuresJour || '', f.joursSem || '',
      ee.kwhYear != null ? Math.round(ee.kwhYear) : '', (f.observations || '').replace(/\s+/g, ' ').trim()]);
  })));
  const csv = rows.map(r => r.map(csvCell).join(';')).join('\r\n');
  const blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'bilan_puissance_wadrabay_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
  toast('Bilan CSV exporté');
}

/* ====================== STOCKAGE (capacité de l'appareil) ====================== */
async function fillStorage(){
  const el = $('storPanel');
  if(!el) return;
  let usage = 0, quota = 0, persisted = false;
  try { if(navigator.storage && navigator.storage.estimate){ const est = await navigator.storage.estimate(); usage = est.usage || 0; quota = est.quota || 0; } } catch(e){}
  try { if(navigator.storage && navigator.storage.persisted) persisted = await navigator.storage.persisted(); } catch(e){}
  const mb = u => fmtNum(u / 1048576, u < 10485760 ? 1 : 0);
  const pctU = quota ? Math.min(100, Math.round(usage / quota * 100)) : 0;
  el.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:baseline">' +
    '<b style="font-size:14px">Stockage de l\'appareil</b>' +
    '<span class="tiny muted">' + mb(usage) + ' Mo' + (quota ? (' / ' + mb(quota) + ' Mo') : '') + '</span></div>' +
    '<div class="bar"><i style="width:' + pctU + '%"></i></div>' +
    '<div class="tiny muted" style="margin-top:6px">' + Object.keys(photos).length + ' photo(s) en mémoire · ' +
    (persisted ? 'mémoire protégée ✅' : 'mémoire non protégée — ouvrez l\'app régulièrement et synchronisez') + '</div>';
}

/* ====================== NAVIGATION ====================== */
function nav(name){
  view.name = name;
  rebuildTree();
  window.scrollTo(0, 0);
  renderHeader();
  if(name === 'home') renderHome();
  else if(name === 'bilan') renderBilan();
  else if(name === 'td') renderTD();
  else if(name === 'room') renderRoom();
  else if(name === 'equip') renderEquip();
}

/* ====================== GRAINE (SEED) MISSION 1 ====================== */
async function seedMission1(){
  const SEED = window.WADRA_SEED;
  if(!SEED) return;
  state.meta = state.meta || {};
  state.ts = state.ts || {};
  state.dirty = state.dirty || {};
  let nEq = 0, nPh = 0;

  // 1) Données saisies terrain — une seule fois, sans JAMAIS écraser une saisie existante
  if(state.meta.seedVersion !== SEED.version){
    for(const id in SEED.equip){
      const cur = state.equip[id];
      const empty = !cur || Object.keys(cur).length === 0;
      if(empty){
        state.equip[id] = Object.assign({}, SEED.equip[id]);
        state.ts['equip:' + id] = SEED.date;   // horodatage stable (date de mission)
        state.dirty['equip:' + id] = 1;         // à pousser vers la base partagée
        nEq++;
      }
    }
    state.meta.seedVersion = SEED.version;
  }

  // 2) Photos terrain — auto-réparant : charge à chaque ouverture celles qui manquent
  //    (permet de récupérer les photos même si elles sont déployées après le code)
  for(const ph of SEED.photos){
    const pid = ph.id;
    if(photos[pid]) continue;
    if((state.photoDel || {})[pid]) continue;
    try {
      const resp = await fetch(ph.src);
      if(!resp || !resp.ok) continue;
      const blob = await resp.blob();
      const rec = {id: pid, key: ph.key, zoneId: SEED.zone, blob: blob, plate: !!ph.plate, synced: false};
      if(idbOK){ try { await idbPut('photos', rec); } catch(e){} }
      rec.url = URL.createObjectURL(blob);
      photos[pid] = rec;
      nPh++;
    } catch(e) {}
  }

  if(nEq || nPh){ await persistState(); toast('Mission 1 : ' + nEq + ' équip. · ' + nPh + ' photo(s)'); }
}

/* ====================== DÉMARRAGE ====================== */
async function boot(){
  // Demande au navigateur de protéger les données locales contre l'éviction
  // automatique (augmente la fiabilité et le quota de stockage sur iOS/Android).
  try { if(navigator.storage && navigator.storage.persist){ await navigator.storage.persist(); } } catch(e){}

  idbOK = await idbOpen();

  // Charger état
  try {
    let s = null;
    if(idbOK) s = await idbGet('kv', 'state');
    if(!s) {
      const ls = localStorage.getItem('wadra_state_v3');
      if(ls) s = JSON.parse(ls);
    }
    if(s){
      state = s;
      state.meta = state.meta || {auditeur:''};
      state.tds = state.tds || {};
      state.equip = state.equip || {};
      state.rooms = state.rooms || {};
    }
  } catch(e) {}

  // Champs nécessaires à la synchro partagée (évite tout plantage de sync.js)
  state.zones = state.zones || {};
  state.custom = state.custom || {};
  ensureStruct(); // modifications de structure (pièces/équipements ajoutés, déplacés, renommés, supprimés)

  // Charger photos
  if(idbOK){
    try {
      const arr = await idbAll('photos');
      arr.forEach(p => { p.url = URL.createObjectURL(p.blob); photos[p.id] = p; });
    } catch(e) {}
  }

  // Pré-remplissage des données de la 1re mission (une seule fois)
  try { await seedMission1(); } catch(e) {}

  nav('home');

  // Démarrage de la synchronisation Supabase (base partagée)
  if(window.Sync && window.Sync.start){ try { window.Sync.start(); } catch(e) {} }
}

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

boot().then(() => { window.__APP_READY = true; });
</script>
<script src="./sync.js"></script>
</body>
